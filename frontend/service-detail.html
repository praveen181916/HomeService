<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Details – HomeService</title>
  <link rel="stylesheet" href="src/styles.css">
  <style>
    .detail-page { padding: 48px 0; }
    .detail-grid { display: grid; grid-template-columns: 1fr 400px; gap: 40px; align-items: start; }
    .detail-img { width: 100%; height: 340px; object-fit: cover; border-radius: var(--radius-lg); }
    .features-list { list-style: none; }
    .features-list li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .features-list li:last-child { border-bottom: none; }
    .features-list li::before { content: '✓'; color: var(--accent); font-weight: 700; font-size: 1rem; }
    .booking-sticky { position: sticky; top: 90px; }
    .price-display { font-size: 2rem; font-weight: 800; margin-bottom: 4px; }
    .price-display span { font-size: 1rem; font-weight: 400; color: var(--text-muted); }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } .booking-sticky { position: relative; top: 0; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">H</div>
      <span class="navbar-brand-text">Home<span>Service</span></span>
    </a>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
    </ul>
    <div class="navbar-actions">
      <a id="nav-login" href="login.html" class="btn btn-primary btn-sm">Login</a>
      <div id="nav-user" style="display:none; align-items:center; gap:10px;">
        <a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>
        <button onclick="logout()" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="detail-page">
  <div class="container">
    <div style="margin-bottom:24px;">
      <a href="services.html" style="color:var(--accent);text-decoration:none;font-size:0.875rem;font-weight:500;">← Back to Services</a>
    </div>

    <div id="service-content">
      <div class="page-loader">
        <div class="page-loader-spinner"></div>
        <span>Loading service details...</span>
      </div>
    </div>
  </div>
</div>

<script src="src/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const serviceId = params.get('id');

  if (!serviceId) window.location.href = 'services.html';

  async function loadService() {
    try {
      const data = await getService(serviceId);
      const s = data.service;
      document.title = `${s.serviceName} – HomeService`;

      document.getElementById('service-content').innerHTML = `
        <div class="detail-grid">
          <div>
            <img class="detail-img" src="${s.image || 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800'}" alt="${s.serviceName}" onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800'">

            <div style="margin-top:28px;">
              <span class="service-category-tag">${s.category}</span>
              <h1 style="font-size:1.8rem;font-weight:800;margin:12px 0 8px;">${s.serviceName}</h1>

              <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;">
                <div class="service-rating" style="font-size:0.95rem;"><span class="star">★</span> <strong>${s.rating}</strong> (${s.totalReviews} reviews)</div>
                <div style="color:var(--text-secondary);font-size:0.875rem;">⏱ ${s.duration}</div>
              </div>

              <p style="color:var(--text-secondary);line-height:1.8;font-size:0.95rem;margin-bottom:28px;">${s.description}</p>

              <h3 style="font-weight:700;margin-bottom:16px;">What's Included</h3>
              <ul class="features-list">
                ${(s.features || []).map(f => `<li>${f}</li>`).join('')}
                <li>Verified & background-checked professional</li>
                <li>Doorstep service – no travel needed</li>
                <li>30-day service guarantee</li>
              </ul>
            </div>
          </div>

          <div class="booking-sticky">
            <div class="card">
              <div class="card-body">
                <div class="price-display">₹${s.price.toLocaleString('en-IN')} <span>onwards</span></div>
                <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:24px;">Final price may vary based on your requirements</p>

                <div style="background:var(--bg);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px;">
                  <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.875rem;">
                    <span style="color:var(--text-secondary);">Category</span>
                    <strong>${s.category}</strong>
                  </div>
                  <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.875rem;">
                    <span style="color:var(--text-secondary);">Duration</span>
                    <strong>${s.duration}</strong>
                  </div>
                  <div style="display:flex;justify-content:space-between;font-size:0.875rem;">
                    <span style="color:var(--text-secondary);">Rating</span>
                    <strong>★ ${s.rating}/5</strong>
                  </div>
                </div>

                <button onclick="bookNow('${s._id}')" class="btn btn-accent btn-full btn-lg">Book Now</button>
                <button onclick="bookNow('${s._id}')" class="btn btn-outline btn-full" style="margin-top:10px;">Schedule for Later</button>

                <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
                  <div style="display:flex;gap:8px;align-items:flex-start;font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;">
                    <span>✅</span> Free cancellation up to 24 hours before
                  </div>
                  <div style="display:flex;gap:8px;align-items:flex-start;font-size:0.8rem;color:var(--text-secondary);margin-bottom:8px;">
                    <span>🛡️</span> Verified & insured professionals
                  </div>
                  <div style="display:flex;gap:8px;align-items:flex-start;font-size:0.8rem;color:var(--text-secondary);">
                    <span>💳</span> Pay after service completion
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    } catch (err) {
      document.getElementById('service-content').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Service not found</div></div>';
    }
  }

  function bookNow(serviceId) {
    if (!isLoggedIn()) {
      window.location.href = `login.html?redirect=booking.html?id=${serviceId}`;
      return;
    }
    window.location.href = `booking.html?id=${serviceId}`;
  }

  loadService();
</script>
</body>
</html>

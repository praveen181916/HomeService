<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register – HomeService</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">H</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Sign in to your account or create a new one</p>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          Password
          <a href="#" style="color:var(--accent);font-weight:500;text-decoration:none;font-size:0.85rem;">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
          <button type="button" onclick="togglePassword('login-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        Sign In
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="reg-phone" placeholder="9876543210" pattern="[0-9]{10}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" minlength="6" required>
          <button type="button" onclick="togglePassword('reg-password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="reg-confirm" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-btn">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--text-muted);">
      <a href="index.html" style="color:var(--accent);text-decoration:none;">← Back to Home</a>
    </p>
    <p style="text-align:center;margin-top:12px;font-size:0.75rem;color:var(--text-muted);">
      Demo: admin@homeservice.com / admin123
    </p>
  </div>
</div>

<script src="src/api.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) {
    window.location.href = isAdmin() ? 'admin.html' : 'dashboard.html';
  }

  // Check URL params for default tab
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('tab') === 'register') switchTab('register');

  function switchTab(tab) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    hideAlert();

    if (tab === 'login') {
      loginForm.style.display = '';
      registerForm.style.display = 'none';
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
    } else {
      loginForm.style.display = 'none';
      registerForm.style.display = '';
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
    }
  }

  function showAlert(msg, type) {
    const alert = document.getElementById('alert');
    alert.textContent = msg;
    alert.className = `alert alert-${type} show`;
  }
  function hideAlert() {
    const alert = document.getElementById('alert');
    alert.className = 'alert';
  }

  function togglePassword(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="loader"></span> Please wait...' : btn.dataset.text;
  }

  document.getElementById('login-btn').dataset.text = 'Sign In';
  document.getElementById('register-btn').dataset.text = 'Create Account';

  async function handleLogin(e) {
    e.preventDefault();
    setLoading('login-btn', true);
    hideAlert();
    try {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const data = await login(email, password);
      saveAuth(data.token, data.user);
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 800);
    } catch (err) {
      showAlert(err.message || 'Login failed. Please check your credentials.', 'error');
      setLoading('login-btn', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const password = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    if (password !== confirm) {
      showAlert('Passwords do not match!', 'error');
      return;
    }
    setLoading('register-btn', true);
    hideAlert();
    try {
      const data = await register(
        document.getElementById('reg-name').value,
        document.getElementById('reg-email').value,
        password,
        document.getElementById('reg-phone').value
      );
      saveAuth(data.token, data.user);
      showAlert('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (err) {
      showAlert(err.message || 'Registration failed. Please try again.', 'error');
      setLoading('register-btn', false);
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services – HomeService</title>
  <link rel="stylesheet" href="src/styles.css">
  <style>
    .services-page { padding: 48px 0; }
    .page-header { margin-bottom: 36px; }
    .filters-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 28px; }
    .price-range { display: flex; gap: 8px; align-items: center; }
    .price-range input { width: 100px; }
    .results-count { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 20px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-logo">H</div>
      <span class="navbar-brand-text">Home<span>Service</span></span>
    </a>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html" class="active">Services</a></li>
    </ul>
    <div class="navbar-actions">
      <a id="nav-login" href="login.html" class="btn btn-primary btn-sm">Login / Register</a>
      <div id="nav-user" style="display:none; align-items:center; gap:10px;">
        <a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>
        <button onclick="logout()" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;">Logout</button>
      </div>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<div class="services-page">
  <div class="container">
    <div class="page-header">
      <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:6px;">All Services</h1>
      <p style="color:var(--text-secondary);">Browse and book from 25+ professional services</p>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <span style="font-size:1.1rem;">🔍</span>
      <input type="text" id="search-input" placeholder="Search services (e.g., AC cleaning, plumber...)">
      <button onclick="applyFilters()" class="btn btn-accent btn-sm">Search</button>
    </div>

    <!-- CATEGORY FILTERS -->
    <div class="filters-row">
      <span style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);">Category:</span>
      <button class="filter-tab active" onclick="filterByCategory('all', this)">All</button>
      <button class="filter-tab" onclick="filterByCategory('AC Service', this)">❄️ AC Service</button>
      <button class="filter-tab" onclick="filterByCategory('Plumbing', this)">🔧 Plumbing</button>
      <button class="filter-tab" onclick="filterByCategory('Electrician', this)">⚡ Electrician</button>
      <button class="filter-tab" onclick="filterByCategory('Home Cleaning', this)">🏠 Cleaning</button>
      <button class="filter-tab" onclick="filterByCategory('Beauty Services', this)">💆 Beauty</button>
    </div>

    <div id="results-count" class="results-count"></div>

    <div class="services-grid" id="services-container">
      <div class="page-loader" style="grid-column:1/-1;">
        <div class="page-loader-spinner"></div>
        <span>Loading services...</span>
      </div>
    </div>
  </div>
</div>

<footer style="background:var(--primary);color:#64748b;padding:24px 0;text-align:center;font-size:0.85rem;margin-top:60px;">
  © 2024 HomeService. All rights reserved.
</footer>

<script src="src/api.js"></script>
<script>
  let currentCategory = 'all';
  let currentSearch = '';

  // Read URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('category')) {
    currentCategory = params.get('category');
  }

  async function loadServices() {
    const container = document.getElementById('services-container');
    container.innerHTML = '<div class="page-loader" style="grid-column:1/-1;"><div class="page-loader-spinner"></div><span>Loading...</span></div>';

    try {
      const query = {};
      if (currentCategory !== 'all') query.category = currentCategory;
      if (currentSearch) query.search = currentSearch;

      const data = await getServices(query);

      document.getElementById('results-count').textContent = `Showing ${data.count} service${data.count !== 1 ? 's' : ''}`;

      if (!data.services.length) {
        container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No services found</div><div class="empty-state-sub">Try different keywords or categories</div></div>';
        return;
      }

      container.innerHTML = data.services.map(s => `
        <div class="service-card">
          <img class="service-card-img" src="${s.image || 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400'}" alt="${s.serviceName}" onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400'">
          <div class="service-card-body">
            <span class="service-category-tag">${s.category}</span>
            <div class="service-card-title">${s.serviceName}</div>
            <div class="service-card-desc">${s.description}</div>
            <div class="service-card-meta">
              <div>
                <div class="service-card-price">₹${s.price.toLocaleString('en-IN')} <span>onwards</span></div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">⏱ ${s.duration}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
                <div class="service-rating"><span class="star">★</span> ${s.rating} (${s.totalReviews})</div>
                <a href="service-detail.html?id=${s._id}" class="btn btn-accent btn-sm">View & Book</a>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      // Highlight active filter
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent.includes(currentCategory) || (currentCategory === 'all' && tab.textContent === 'All'));
      });
    } catch (err) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Could not load services</div><div class="empty-state-sub">Make sure the backend server is running on port 5000</div></div>';
    }
  }

  function filterByCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadServices();
  }

  function applyFilters() {
    currentSearch = document.getElementById('search-input').value.trim();
    loadServices();
  }

  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyFilters();
  });

  loadServices();
</script>
</body>
</html>

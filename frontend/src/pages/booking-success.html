<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Booking Confirmed – ServeEasy</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>
<nav class="navbar">
  <a href="../../index.html" class="navbar-brand">
    <div class="brand-logo">S</div>
    <span class="brand-name">Serve<span>Easy</span></span>
  </a>
</nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <h2 class="success-title">Booking Confirmed!</h2>
    <p class="success-sub" id="successMsg">Your service has been booked successfully. A professional will arrive at your doorstep on the scheduled time.</p>
    <div style="background:var(--accent-light);border-radius:var(--radius-sm);padding:16px;margin-bottom:24px;text-align:left;">
      <div style="font-size:0.88rem;color:var(--muted);margin-bottom:6px;">Booking Details</div>
      <div style="font-weight:700;font-size:0.95rem;" id="detailService"></div>
      <div style="font-size:0.88rem;margin-top:4px;" id="detailDateTime"></div>
    </div>
    <div style="display:flex;gap:10px;flex-direction:column;">
      <a href="bookings.html" class="btn btn-primary btn-lg" style="justify-content:center;">View My Bookings</a>
      <a href="services.html" class="btn btn-outline btn-lg" style="justify-content:center;">Book Another Service</a>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const service = params.get('service') || 'Service';
const date = params.get('date') || '';
const time = params.get('time') || '';
document.getElementById('detailService').textContent = service;
document.getElementById('detailDateTime').textContent = `📅 ${date}  •  🕐 ${time}`;
</script>
</body>
</html>

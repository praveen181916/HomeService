<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Services – ServeEasy</title>
  <link rel="stylesheet" href="../styles/main.css"/>
</head>
<body>

<nav class="navbar">
  <a href="../../index.html" class="navbar-brand">
    <div class="brand-logo">S</div>
    <span class="brand-name">Serve<span>Easy</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="../../index.html">Home</a></li>
    <li><a href="services.html" class="active">Services</a></li>
    <li><a href="bookings.html">My Bookings</a></li>
    <li><a href="auth.html" class="btn btn-primary" id="authBtn">Login</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="../../index.html">Home</a> › Services</div>
  <h1>Our Services</h1>
  <p>Professional services delivered at your doorstep</p>
</div>

<section class="section" style="padding-top:40px;">
  <!-- SEARCH & FILTER -->
  <div class="search-bar">
    <input type="text" placeholder="🔍  Search services..." id="searchInput" oninput="filterServices()"/>
    <select id="categoryFilter" onchange="filterServices()">
      <option value="">All Categories</option>
      <option>AC Service</option>
      <option>Plumbing</option>
      <option>Electrician</option>
      <option>Cleaning</option>
      <option>Beauty</option>
    </select>
    <button class="btn btn-accent btn-sm" onclick="filterServices()">Filter</button>
  </div>

  <div class="services-grid" id="servicesGrid">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</section>

<footer class="footer" style="margin-top:40px;">
  <div class="footer-bottom" style="border-top:none;">
    <span>© 2025 ServeEasy. All rights reserved.</span>
    <a href="../../index.html" style="color:var(--accent);">← Back to Home</a>
  </div>
</footer>

<script>
const API = 'http://localhost:5000/api';
const ICONS = { 'AC Service':'❄️', 'Plumbing':'🔧', 'Electrician':'⚡', 'Cleaning':'🧹', 'Beauty':'💆', 'Other':'🏠' };

// Sample offline data if backend not running
const SAMPLE_SERVICES = [
  { _id:'1', serviceName:'AC Deep Cleaning', price:699, description:'Complete AC unit deep cleaning including filters, coils, and drain pipe.', category:'AC Service', duration:'2-3 hours' },
  { _id:'2', serviceName:'AC Gas Refilling', price:1299, description:'Professional AC gas refilling with pressure check and leak detection.', category:'AC Service', duration:'1-2 hours' },
  { _id:'3', serviceName:'Tap/Faucet Repair', price:299, description:'Fix leaking taps, faucets, and pipe joints quickly and efficiently.', category:'Plumbing', duration:'1 hour' },
  { _id:'4', serviceName:'Drain Unclogging', price:499, description:'Professional drain unclogging service for kitchen and bathroom.', category:'Plumbing', duration:'1-2 hours' },
  { _id:'5', serviceName:'Wiring & Switches', price:399, description:'Electrical wiring, switch board installation and repair.', category:'Electrician', duration:'1-3 hours' },
  { _id:'6', serviceName:'Fan Installation', price:249, description:'Ceiling fan and exhaust fan installation and repair.', category:'Electrician', duration:'1 hour' },
  { _id:'7', serviceName:'Full Home Cleaning', price:1999, description:'Complete home deep cleaning including kitchen, bathrooms, and living areas.', category:'Cleaning', duration:'4-6 hours' },
  { _id:'8', serviceName:'Bathroom Cleaning', price:599, description:'Thorough bathroom sanitization and cleaning service.', category:'Cleaning', duration:'1-2 hours' },
  { _id:'9', serviceName:'Haircut at Home', price:349, description:'Professional haircut and styling at the comfort of your home.', category:'Beauty', duration:'45 mins' },
  { _id:'10', serviceName:'Facial & Cleanup', price:799, description:'Relaxing facial and skin cleanup by certified beauticians.', category:'Beauty', duration:'1.5 hours' }
];

let allServices = [];

async function loadServices() {
  try {
    const res = await fetch(`${API}/services`);
    allServices = await res.json();
  } catch (e) {
    allServices = SAMPLE_SERVICES;
  }
  // Check URL param for category filter
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('category');
  if (cat) document.getElementById('categoryFilter').value = cat;
  filterServices();
}

function filterServices() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  const filtered = allServices.filter(s =>
    (!search || s.serviceName.toLowerCase().includes(search) || s.description.toLowerCase().includes(search)) &&
    (!category || s.category === category)
  );
  renderServices(filtered);
}

function renderServices(services) {
  const grid = document.getElementById('servicesGrid');
  if (!services.length) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);grid-column:1/-1;">No services found. Try a different search or category.</div>';
    return;
  }
  grid.innerHTML = services.map(s => `
    <div class="service-card">
      <div class="service-card-img">${ICONS[s.category] || '🏠'}</div>
      <div class="service-card-body">
        <span class="service-card-category">${s.category}</span>
        <div class="service-card-title">${s.serviceName}</div>
        <div class="service-card-desc">${s.description}</div>
        <div class="service-card-footer">
          <span class="service-card-price">₹${s.price.toLocaleString()}</span>
          <span class="service-card-duration">⏱ ${s.duration}</span>
        </div>
        <a href="service-detail.html?id=${s._id}" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:14px;">View Details</a>
        <button onclick="bookService('${s._id}')" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Book Now</button>
      </div>
    </div>
  `).join('');
}

function bookService(id) {
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!user) { window.location.href = 'auth.html'; return; }
  window.location.href = `booking.html?serviceId=${id}`;
}

// Navbar
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (user) {
  document.getElementById('authBtn').textContent = user.name.split(' ')[0];
  document.getElementById('authBtn').href = user.role === 'admin' ? 'admin.html' : 'bookings.html';
}

loadServices();
</script>
</body>
</html>
